async function saveRecordToSupabase(record){
 const { data, error } = await supabaseClient
  .from("nursing_records")
  .insert({
      facility_id: FACILITY_IDS[state.facilityId],
      patient_name: record.user,
      staff_name: record.staff,
      job: record.job,
      visit_date: record.date,
      start_time: record.startTime,
      end_time: record.endTime,
      total_minutes: record.minutes,
      content: record.content,
      temperature: record.vitals.temperature || null,
      systolic: record.vitals.systolic || null,
      diastolic: record.vitals.diastolic || null,
      pulse: record.vitals.pulse || null,
      spo2: record.vitals.spo2 || null,
      memo: record.vitals.memo || ""
   })
.select("id")
.single();

  if(error){
    alert("記録保存エラー: " + error.message);
    return false;
  }

  alert("Supabase記録保存成功");
return data.id;
}
async function loadRecordsFromSupabase(){
  const { data, error } = await supabaseClient
    .from("nursing_records")
    .select("*")
    .eq("facility_id", FACILITY_IDS[state.facilityId])
    .order("created_at", { ascending:false });

  if(error){
    alert("記録読込エラー: " + error.message);
    return;
  }

  state.records = data.map(r => ({
    id: r.id,
    facilityId: state.facilityId,
    date: r.visit_date,
    user: r.patient_name,
    staff: r.staff_name,
    job: r.job,
    content: r.content,
    startTime: r.start_time,
    endTime: r.end_time,
    minutes: r.total_minutes || 0,
    visitNo: 0,
    vitals:{
      temperature: r.temperature || "",
      systolic: r.systolic || "",
      diastolic: r.diastolic || "",
      pulse: r.pulse || "",
      spo2: r.spo2 || "",
      memo: r.memo || ""
    }
  }));
const visitCountMap = {};

state.records
  .sort((a,b) => {
    if(a.date !== b.date) return a.date.localeCompare(b.date);
    return (a.startTime || "").localeCompare(b.startTime || "");
  })
  .forEach(r => {
    const key = `${r.date}_${r.user}`;
    visitCountMap[key] = (visitCountMap[key] || 0) + 1;
    r.visitNo = visitCountMap[key];
  });

  save();
  render();
}

  if(error){

function beginEdit(id){state.editingId=id;save();render()}
function cancelEdit(){state.editingId=null;save();render()}
async function saveEdit(id){
  const r = state.records.find(x => x.id === id);
  if(!r) return;

  const updated = {
    visit_date: document.getElementById(`ed-date-${id}`).value,
    patient_name: document.getElementById(`ed-user-${id}`).value,
    staff_name: document.getElementById(`ed-staff-${id}`).value,
    job: document.getElementById(`ed-job-${id}`).value,
    content: document.getElementById(`ed-content-${id}`).value,
    start_time: document.getElementById(`ed-start-${id}`).value,
    end_time: document.getElementById(`ed-end-${id}`).value,
    temperature: document.getElementById(`ed-temp-${id}`).value || null,
    systolic: document.getElementById(`ed-sys-${id}`).value || null,
    diastolic: document.getElementById(`ed-dia-${id}`).value || null,
    pulse: document.getElementById(`ed-pulse-${id}`).value || null,
    spo2: document.getElementById(`ed-spo2-${id}`).value || null,
    memo: document.getElementById(`ed-memo-${id}`).value || ""
  };

  updated.total_minutes = mins(updated.start_time, updated.end_time);

  const { error } = await supabaseClient
    .from("nursing_records")
    .update(updated)
    .eq("id", id);

  if(error){
    alert("記録修正エラー: " + error.message);
    return;
  }

  alert("記録修正成功");

  state.editingId = null;
  await loadRecordsFromSupabase();
}
async function deleteRecord(id){

  if(!isAdmin()) return;

  if(!confirm("この記録を削除する？")) return;

  const { error } = await supabaseClient
    .from("nursing_records")
    .delete()
    .eq("id", id);

  if(error){
    alert("記録削除エラー: " + error.message);
    return;
  }

  alert("記録削除成功");

  await loadRecordsFromSupabase();
}

function csv(list,name){
  if(!isAdmin()) return;

  const header = [
    "日付",
    "訪問回数",
    "名前",
    "開始",
    "終了",
    "合計分数"
  ];

  const rows = list.map(r => [
    r.date,
    r.visitNo + "回目",
    r.user,
    r.startTime,
    r.endTime,
    r.minutes
  ]);

  const text = [header, ...rows]
    .map(row => row.map(c => `"${String(c ?? "").replaceAll('"','""')}"`).join(","))
    .join("\n");

  const blob = new Blob(["\uFEFF" + text], {
    type: "text/csv;charset=utf-8;"
  });

  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = name;
  a.click();
  URL.revokeObjectURL(url);
}
function dailyCSV(){state.csvPanel="daily";save();render()}
function weeklyCSV(){state.csvPanel="weekly";save();render()}
function monthlyCSV(){state.csvPanel="monthly";save();render()}

function exportDailyCSV(){const d=document.getElementById("csvDailyDate")?.value||state.date;csv(records().filter(r=>r.date===d),`日別CSV_${facility().short}_${d}.csv`)}
function exportWeeklyCSV(){const d=document.getElementById("csvWeeklyDate")?.value||state.date,w=weekRange(d);csv(records().filter(r=>r.date>=w.start&&r.date<=w.end),`週別CSV_${facility().short}_${w.start}_${w.end}.csv`)}
function exportMonthlyCSV(){const m=document.getElementById("csvMonthlyMonth")?.value||state.date.slice(0,7);csv(records().filter(r=>r.date.startsWith(m)),`月別CSV_${facility().short}_${m}.csv`)}
function exportUserCSV(){
  const u=document.getElementById("csvUserSelect")?.value||"全員";

  if(u==="全員"){
    alert("印刷用は利用者を1名選んでね");
    return;
  }

  const list=records()
    .filter(r=>r.user===u)
    .sort((a,b)=>{
      if(a.date!==b.date) return a.date.localeCompare(b.date);
      return (a.startTime||"").localeCompare(b.startTime||"");
    });

  const header=[
    "日付",
    "訪問回数",
    "職員",
    "職種",
    "内容",
    "開始",
    "終了",
    "合計分数",
    "記録"
  ];

  const rows=list.map(r=>[
    r.date,
    r.visitNo+"回目",
    r.staff,
    r.job,
    r.content,
    r.startTime,
    r.endTime,
    r.minutes,
    r.vitals?.memo||""
  ]);

  const totalMinutes=list.reduce((sum,r)=>sum+Number(r.minutes||0),0);

  const summary=[
    [],
    ["利用者名",u],
    ["総訪問回数",list.length+"回"],
    ["累積時間",totalMinutes+"分"]
  ];

  const text=[...summary,[],header,...rows]
    .map(row=>row.map(c=>`"${String(c??"").replaceAll('"','""')}"`).join(","))
    .join("\n");

  const blob=new Blob(["\uFEFF"+text],{type:"text/csv;charset=utf-8;"});
  const url=URL.createObjectURL(blob);
  const a=document.createElement("a");

  a.href=url;
  a.download=`利用者別記録_${facility().short}_${u}.csv`;
  a.click();

  URL.revokeObjectURL(url);
}
