function now(){return new Date().toTimeString().slice(0,5)}

function mins(s,e){if(!s||!e)return 0;const[sh,sm]=s.split(":").map(Number),[eh,em]=e.split(":").map(Number);return Math.max(0,eh*60+em-(sh*60+sm))}

function csv(list,name){
if(!isAdmin())return;
const header=["拠点","日付","訪問回数","利用者名","職員名","職種","内容","開始時間","終了時間","合計分","体温","血圧上","血圧下","脈拍","SpO2","メモ"];
const rows=list.map(r=>[facility().name,r.date,r.visitNo,r.user,r.staff,r.job,r.content,r.startTime,r.endTime,r.minutes,r.vitals.temperature,r.vitals.systolic,r.vitals.diastolic,r.vitals.pulse,r.vitals.spo2,r.vitals.memo]);
const text=[header,...rows].map(row=>row.map(c=>`"${String(c??"").replaceAll('"','""')}"`).join(",")).join("\n");
const blob=new Blob(["\uFEFF"+text],{type:"text/csv;charset=utf-8;"}),url=URL.createObjectURL(blob),a=document.createElement("a");
a.href=url;a.download=name;a.click();URL.revokeObjectURL(url);
}

if(state.csvPanel==="weekly"){
body=`<label>週を選ぶ日付<input id="csvWeeklyDate" type="date" value="${h(state.date)}"></label><p class="muted">選択した日付を含む月曜〜日曜の記録を出力します。</p>`;
action=`<button onclick="exportWeeklyCSV()">この週でCSV出力</button>`;
}
if(state.csvPanel==="monthly"){
body=`<label>出力月<input id="csvMonthlyMonth" type="month" value="${h(state.date.slice(0,7))}"></label>`;
action=`<button onclick="exportMonthlyCSV()">この月でCSV出力</button>`;
}
if(state.csvPanel==="user"){
body=`<div class="csv-user-row">
<label>利用者検索<input id="csvUserSearch" placeholder="名前・居室で検索" value="${h(state.csvUserSearch||"")}" oninput="state.csvUserSearch=this.value;save();render()"></label>
<label>出力対象<select id="csvUserSelect"><option value="全員">全員</option>${filteredCsvUsers.map(u=>`<option value="${h(u.name)}">${h(u.room)}号 ${h(u.name)}</option>`).join("")}</select></label>
</div>`;
action=`<button onclick="exportUserCSV()">この条件でCSV出力</button>`;
}
return `<div class="csv-panel"><h3>${title}</h3>${body}<div class="actions">${action}<button class="outline" onclick="closeCsvPanel()">閉じる</button></div></div>`;
}

function render(){
if(!state.login){renderLogin();return}
const us=users(),ss=staff(),rs=records();
const filteredUsers=us.filter(u=>`${u.room} ${u.name}`.includes(state.userSearch));
const filteredCsvUsers=us.filter(u=>`${u.room} ${u.name}`.includes(state.csvUserSearch||""));
const daily=rs.filter(r=>r.date===state.date),total=daily.reduce((s,r)=>s+r.minutes,0),unique=new Set(daily.map(r=>r.user)).size,avg=daily.length?Math.round(total/daily.length):0;
const dailyTotals=group(daily,r=>r.user),monthRs=rs.filter(r=>r.date.startsWith(state.date.slice(0,7))),monthTotals=group(monthRs,r=>r.user);
const target=state.filterUser==="全員"?rs:rs.filter(r=>r.user===state.filterUser);
const achDaily=group(target,r=>r.date),achWeekly=group(target,r=>{const w=weekRange(r.date);return `${w.start}〜${w.end}`}),achMonthly=group(target,r=>r.date.slice(0,7)),achUser=group(rs,r=>r.user);
const current=state.tab==="日別"?achDaily:state.tab==="週別"?achWeekly:state.tab==="月間"?achMonthly:achUser;

root.innerHTML=`
<div class="app">
<div class="header">
  <div>
    <h1>看護記録・時間積算アプリ Ver6.0-DB</h1>
    <p>${h(facility().name)} <span class="badge">${isAdmin()?"管理者画面":"職員画面"}</span></p>
    <p class="muted">${isAdmin()?"管理者は削除・マスタ管理・CSV出力ができるよ。":"職員は入室・退室・記録入力・修正ができるよ。削除は不可。"}</p>
  </div>

  <div class="actions">
    <button class="outline" onclick="logout()">ログアウト</button>
  </div>
</div>

<div class="grid">
<section class="card ${isAdmin()?"":"full"}">
<h2>職員入力画面</h2>
<div class="form4">
<label>日付<input id="date" type="date" value="${h(state.date)}" onchange="state.date=this.value;save();render()"></label>
<label>利用者検索<input placeholder="名前・居室で検索" value="${h(state.userSearch)}" oninput="state.userSearch=this.value;save();render()"></label>
<label>利用者様<select id="selectedUser" onchange="state.selectedUser=this.value;save();render()"><option value="">選択してください</option>${filteredUsers.map(u=>`<option value="${h(u.name)}" ${state.selectedUser===u.name?"selected":""}>${h(u.room)}号 ${h(u.name)}</option>`).join("")}</select></label>
<label>職員名<select id="staffName" onchange="onStaffChange()">${ss.map(s=>`<option value="${h(s.name)}" ${state.selectedStaff===s.name?"selected":""}>${h(s.name)}（${h(s.job)}）</option>`).join("")}</select></label>
</div>

<div class="form2"><button onclick="startVisit()" ${state.active?"disabled":""}>入室</button><button class="outline" onclick="endVisit()" ${!state.active?"disabled":""}>退室</button></div>

<label>内容<select id="content" onchange="state.content=this.value;save();render()">${state.contentMaster.map(o=>`<option value="${h(o)}" ${state.content===o?"selected":""}>${h(o)}</option>`).join("")}</select></label>
${state.content==="その他"?`<input id="custom" placeholder="その他の内容" value="${h(state.custom)}">`:""}

${state.active?`<div class="active-box">入室中：${h(state.active.user)} / ${h(state.active.staff)}（${h(state.active.job)}）/ 開始 ${h(state.active.startTime)}</div>`:""}

<div class="form5">
<input id="temperature" type="number" step="0.1" placeholder="体温" value="${h(state.vitals.temperature||"36.5")}">
<input id="systolic" placeholder="血圧 上" value="${h(state.vitals.systolic)}">
<input id="diastolic" placeholder="血圧 下" value="${h(state.vitals.diastolic)}">
<input id="pulse" placeholder="脈拍" value="${h(state.vitals.pulse)}">
<input id="spo2" type="number" step="1" min="0" max="100" placeholder="SpO2" value="${h(state.vitals.spo2||"95")}">
</div>
<textarea id="memo" placeholder="記録欄・申し送り・特記事項">${h(state.vitals.memo)}</textarea>
</section>

${isAdmin()?`
<section class="card"><h2>日別・月間別累計</h2><h3>日別</h3>${Object.entries(dailyTotals).map(([u,s])=>`<div class="mini"><b>${h(u)}</b><span>${s.visits}回 / ${fmt(s.minutes)}</span></div>`).join("")||`<p class="muted">この日の記録はないよ。</p>`}<h3>月間</h3>${Object.entries(monthTotals).map(([u,s])=>`<div class="mini"><b>${h(u)}</b><span>${s.visits}回 / ${fmt(s.minutes)}</span></div>`).join("")||`<p class="muted">この月の記録はないよ。</p>`}</section>

<section class="card"><h2>利用者マスタ管理</h2><div class="master"><input id="newUserName" placeholder="利用者名"><input id="newUserRoom" placeholder="居室"><button onclick="addUser()">追加</button></div>${us.map(u=>`<div class="row"><div><b>${h(u.name)}</b><p>居室：${h(u.room||"未設定")} / ${h(u.status)}</p></div><button class="icon danger"<button onclick="deleteUser('${u.id}')">削除</button></div>`).join("")}</section>

<section class="card"><h2>職員マスタ管理</h2><div class="master"><input id="newStaffName" placeholder="職員名"><select id="newStaffJob">${JOBS.map(j=>`<option value="${h(j)}">${h(j)}</option>`).join("")}</select><button onclick="addStaff()">追加</button></div>${ss.map(s=>`<div class="row"><div><b>${h(s.name)}</b><p>職種：${h(s.job)}</p></div><button class="icon danger" onclick="deleteStaff('${s.id}')">削除</button></div>`).join("")}</section>

<section class="card"><h2>内容マスタ管理</h2><div class="master"><input id="newContent" placeholder="内容項目を追加"><span></span><button onclick="addContent()">追加</button></div>${state.contentMaster.map(c=>`<div class="row"><div><b>${h(c)}</b></div><button class="icon danger" onclick="deleteContent('${h(c)}')">削除</button></div>`).join("")}</section>
`:""}

<section class="card full"><h2>${isAdmin()?"記録一覧・修正・削除":"記録一覧・修正"}</h2><div class="table-wrap"><table><thead><tr><th>日付</th><th>訪問</th><th>利用者</th><th>職員名</th><th>職種</th><th>内容</th><th>時間</th><th>バイタル</th><th>記録</th><th>操作</th></tr></thead><tbody>${rs.map(recordRow).join("")}</tbody></table></div></section>

${isAdmin()?`
<section class="card full"><h2>実績確認</h2><div class="summary"><div><small>本日の訪問数</small><b>${daily.length}回</b></div><div><small>合計時間</small><b>${fmt(total)}</b></div><div><small>対応利用者数</small><b>${unique}名</b></div><div><small>平均対応時間</small><b>${avg}分</b></div></div>
${csvPanelHtml(filteredCsvUsers)}
<label>利用者絞り込み<select id="filterUser" onchange="state.filterUser=this.value;save();render()"><option value="全員">全員</option>${us.map(u=>`<option value="${h(u.name)}" ${state.filterUser===u.name?"selected":""}>${h(u.name)}</option>`).join("")}</select></label>
<div class="tabs">${["日別","週別","月間","利用者別"].map(t=>`<button class="${state.tab===t?"active":""}" onclick="state.tab='${t}';save();render()">${t}</button>`).join("")}</div>
<div class="table-wrap"><table><thead><tr><th>${state.tab==="日別"?"日付":state.tab==="週別"?"週":state.tab==="月間"?"月":"利用者様"}</th><th>訪問回数</th><th>累積介入時間</th></tr></thead><tbody>${Object.entries(current).map(([k,s])=>`<tr><td>${h(k)}</td><td>${s.visits}回</td><td>${fmt(s.minutes)}</td></tr>`).join("")}</tbody></table></div></section>
<div class="full" style="text-align:right"><button class="outline" onclick="resetAll()">全データ初期化</button></div>
`:""}
</div></div>`;
}
render();
</script>
</body>
</html>
